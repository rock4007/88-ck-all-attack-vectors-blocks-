name: Adversarial Regression

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  run-adversarial-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run ATT&CK scenarios
        working-directory: adversarial-harness
        run: |
          python runner.py --strict
