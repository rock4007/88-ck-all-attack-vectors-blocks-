name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - pillar1-morphic
          - pillar2-consensus
          - stability-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run unit tests
        working-directory: ${{ matrix.module }}
        run: |
          go mod tidy
          go test ./... -coverprofile=coverage.out

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate entropy code
        working-directory: pillar3-entropy
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall cmd internal

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build
