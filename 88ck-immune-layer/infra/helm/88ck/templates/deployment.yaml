apiVersion: apps/v1
kind: Deployment
metadata:
  name: 88ck-gateway
  labels:
    app.kubernetes.io/name: 88ck-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: 88ck-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: 88ck-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
