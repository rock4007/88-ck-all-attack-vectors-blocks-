name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build binaries and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go binaries
        run: |
          mkdir -p dist
          (cd 88ck-immune-layer/pillar1-morphic  && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../dist/gateway       ./cmd/gateway)
          (cd 88ck-immune-layer/pillar2-consensus && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../dist/consensus     ./cmd/consensus)
          (cd 88ck-immune-layer/stability-engine  && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../dist/engine        ./cmd/engine)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gateway
            dist/consensus
            dist/engine
