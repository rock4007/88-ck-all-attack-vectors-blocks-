apiVersion: v1
kind: Service
metadata:
  name: {{ include "immune-layer.fullname" . }}
  labels:
    {{- include "immune-layer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "immune-layer.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
