name: Release

'on':
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-images:
    name: Publish container image - ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - name: morphic
            context: 88ck-immune-layer/pillar1-morphic
            image_name: 88ck-morphic
          - name: consensus
            context: 88ck-immune-layer/pillar2-consensus
            image_name: 88ck-consensus
          - name: entropy
            context: 88ck-immune-layer/pillar3-entropy
            image_name: 88ck-entropy
          - name: stability
            context: 88ck-immune-layer/stability-engine
            image_name: 88ck-stability
          - name: frontend
            context: 88ck-immune-layer/frontend
            image_name: 88ck-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-and-release:
    name: Build release assets
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: azure/setup-helm@v4

      - name: Build Go binaries
        run: |
          mkdir -p dist
          (cd 88ck-immune-layer/pillar1-morphic  && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../dist/gateway       ./cmd/gateway)
          (cd 88ck-immune-layer/pillar2-consensus && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../dist/consensus     ./cmd/consensus)
          (cd 88ck-immune-layer/stability-engine  && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ../../dist/engine        ./cmd/engine)

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package 88ck-immune-layer/infra/helm/88ck --destination dist
          helm template 88ck 88ck-immune-layer/infra/helm/88ck > dist/88ck-rendered.yaml

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gateway
            dist/consensus
            dist/engine
            dist/immune-layer-*.tgz
            dist/88ck-rendered.yaml
